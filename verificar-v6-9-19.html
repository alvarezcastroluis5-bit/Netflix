<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verificar V6.9.19</title><link rel="stylesheet" href="./css/styles.css?v=6.9.20"></head><body><main style="max-width:920px;margin:32px auto;padding:16px"><article class="glass-panel"><span class="eyebrow">VERIFICACIÓN</span><h1>Centro Premium V6.9.19</h1><p>Valida que el visor Netflix muestre más contenido y que la máscara Disney exista.</p><div id="resultados">Verificando...</div></article></main><script type="module">const checks=[["css/styles.css",t=>t.includes("V6.9.19 · Herramienta Netflix completa y máscara Disney")&&t.includes("netflix-v16-disney-mask")&&t.includes("scale(.80)")],["js/core.js",t=>t.includes("netflix-v16-disney-mask")]];const rows=[];for(const [p,test] of checks){try{const r=await fetch(`${p}?t=${Date.now()}`,{cache:'no-store'});const txt=await r.text();rows.push({p,ok:r.ok&&test(txt)});}catch{rows.push({p,ok:false});}}document.querySelector('#resultados').innerHTML=rows.map(x=>`<div class="stack-row"><strong>${x.p}</strong><span class="status-pill ${x.ok?'active':'expired'}">${x.ok?'OK':'REVISAR'}</span></div>`).join('');</script></body></html>
