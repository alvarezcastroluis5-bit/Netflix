<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar V6.9.21</title>
  <link rel="stylesheet" href="./css/styles.css?v=6.9.21">
</head>
<body>
  <main style="max-width:940px;margin:30px auto;padding:16px">
    <article class="glass-panel">
      <span class="eyebrow">VERIFICACIÓN</span>
      <h1>Centro Premium V6.9.21</h1>
      <p>
        Revisa archivos activos, máscaras Netflix,
        Consultar otra cuenta y loader manual.
      </p>
      <div id="checks">Verificando…</div>
    </article>
  </main>

  <script type="module">
    const checks=[
      [
        "admin.html",
        text=>
          text.includes("bootstrap-admin-6.9.21.js")
      ],
      [
        "revendedores.html",
        text=>
          text.includes("bootstrap-reseller-6.9.21.js")
      ],
      [
        "js/core-6.9.21.js",
        text=>
          text.includes("netflixV21ResetAccount")
          &&text.includes("Consultar otra cuenta")
          &&text.includes(
            "Las consultas automáticas"
          )
          &&text.includes("alreadyActive")
      ],
      [
        "css/styles.css",
        text=>
          text.includes(
            "V6.9.21 · NETFLIX PC"
          )
          &&text.includes(
            ".netflix-v21-continue-visual"
          )
          &&text.includes(
            ".netflix-v21-reset-account"
          )
      ]
    ];

    const rows=[];

    for(const [path,test] of checks){
      try{
        const response=await fetch(
          `${path}?test=${Date.now()}`,
          {cache:"no-store"}
        );

        const text=await response.text();

        rows.push({
          path,
          ok:response.ok&&test(text)
        });
      }catch{
        rows.push({
          path,
          ok:false
        });
      }
    }

    document.querySelector("#checks").innerHTML=
      rows.map(item=>`
        <div class="stack-row">
          <strong>${item.path}</strong>
          <span class="status-pill ${
            item.ok?"active":"expired"
          }">
            ${item.ok?"CORRECTO":"FALTA"}
          </span>
        </div>
      `).join("");
  </script>
</body>
</html>
