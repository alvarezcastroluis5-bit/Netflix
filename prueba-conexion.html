<!doctype html>
<html lang="es" translate="no" class="notranslate">
<head>
  <meta charset="utf-8"><meta name="google" content="notranslate"><meta http-equiv="Content-Language" content="es">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Prueba de conexión</title>
  <link id="mainStylesheet" rel="stylesheet" href="./css/styles.css?v=6.8.1" onerror="this.onerror=null;this.href='./styles.css?v=6.8.1'">
</head>
<body class="login-screen">
  <main class="login-panel" style="width:min(650px,94vw);border:1px solid var(--line);border-radius:24px">
    <span class="eyebrow">DIAGNÓSTICO</span>
    <h2>Prueba de conexión</h2>
    <p id="testStatus">Comprobando JavaScript y Supabase...</p>
    <pre id="testDetails" style="white-space:pre-wrap;color:#aebbd0"></pre>
    <a class="btn primary" href="admin.html">Volver al panel</a>
  </main>
  <script type="module">
    const status = document.getElementById("testStatus");
    const details = document.getElementById("testDetails");
    const sources = [
      "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm",
      "https://esm.sh/@supabase/supabase-js@2",
      "https://cdn.skypack.dev/@supabase/supabase-js"
    ];

    const results = [];

    for (const source of sources) {
      try {
        const module = await import(source);
        results.push(`CORRECTO: ${source} | createClient=${typeof module.createClient}`);
        if (typeof module.createClient === "function") {
          status.textContent = "La conexión JavaScript funciona correctamente.";
          status.style.color = "#61eab0";
          details.textContent = results.join("\n");
          break;
        }
      } catch (error) {
        results.push(`ERROR: ${source} | ${error?.message || String(error)}`);
      }
    }

    if (!results.some(item => item.startsWith("CORRECTO"))) {
      status.textContent = "El navegador o la red está bloqueando las bibliotecas externas.";
      status.style.color = "#ff8996";
      details.textContent = results.join("\n");
    }
  </script>
</body>
</html>
