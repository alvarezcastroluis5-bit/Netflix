<!doctype html>
<html lang="es" translate="no" class="notranslate">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar V6.9.9</title>
  <link rel="stylesheet" href="./css/styles.css?v=6.9.14">
</head>
<body>
  <main style="max-width:900px;margin:30px auto;padding:14px">
    <article class="glass-panel">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Centro Premium V6.9.9</h1>
      <p>
        Comprueba el filtro de Soporte y los archivos responsive.
      </p>
      <div id="viewport" class="notice-box"></div>
      <div id="checks" class="stack-list">Verificando…</div>
    </article>
  </main>

  <script type="module">
    document.querySelector("#viewport").textContent=
      `Pantalla: ${window.innerWidth} × ${window.innerHeight}px`;

    const files=[
      [
        "admin.html",
        text=>
          !text.includes('id="ticketStatusFilter"')
          &&text.includes('data-ticket-view="pending"')
      ],
      [
        "js/admin-6.9.9.js",
        text=>
          text.includes('let adminTicketView=""')
          &&text.includes("pendingStatuses")
      ],
      [
        "js/core-6.9.9.js",
        text=>text.includes("window.innerWidth<=1100")
      ],
      [
        "css/styles.css",
        text=>
          text.includes("V6.9.9 · RESPONSIVE DEFINITIVO")
          &&text.includes(".modal-card.wide")
      ]
    ];

    const results=[];

    for(const [path,test] of files){
      try{
        const response=await fetch(
          `${path}?check=${Date.now()}`,
          {cache:"no-store"}
        );
        const text=await response.text();
        results.push({
          path,
          ok:response.ok&&test(text)
        });
      }catch(error){
        results.push({
          path,
          ok:false
        });
      }
    }

    document.querySelector("#checks").innerHTML=
      results.map(item=>`
        <div class="stack-row">
          <strong>${item.path}</strong>
          <span class="status-pill ${item.ok?"active":"expired"}">
            ${item.ok?"CORRECTO":"FALTA"}
          </span>
        </div>
      `).join("");
  </script>
</body>
</html>
