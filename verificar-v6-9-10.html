<!doctype html>
<html lang="es" translate="no" class="notranslate">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar V6.9.10</title>
  <link rel="stylesheet" href="./css/styles.css?v=6.9.12">
</head>
<body>
  <main style="max-width:900px;margin:30px auto;padding:14px">
    <article class="glass-panel">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Centro Premium V6.9.10</h1>
      <p>Comprueba las nuevas métricas del distribuidor.</p>
      <div id="checks" class="stack-list">Verificando…</div>
    </article>
  </main>

  <script type="module">
    const files=[
      [
        "revendedores.html",
        text=>
          text.includes("Cuentas disponibles para venta")
          &&text.includes("Tickets de soporte")
          &&text.includes("Pendientes por atender")
          &&text.includes("Próximos cobros")
          &&!text.includes("Usuarios directos")
          &&!text.includes("Cuentas visibles")
      ],
      [
        "js/reseller-6.9.10.js",
        text=>
          text.includes("metrics.direct_accounts")
          &&text.includes("availableForSale")
          &&text.includes("pendingSupportTickets")
          &&text.includes("upcomingCollections")
      ],
      [
        "css/styles.css",
        text=>
          text.includes("V6.9.10 · MÉTRICAS DEL DISTRIBUIDOR")
          &&text.includes(".distributor-dashboard-metrics")
      ]
    ];

    const results=[];

    for(const [path,test] of files){
      try{
        const response=await fetch(
          `${path}?check=${Date.now()}`,
          {cache:"no-store"}
        );
        const text=await response.text();

        results.push({
          path,
          ok:response.ok&&test(text)
        });
      }catch{
        results.push({
          path,
          ok:false
        });
      }
    }

    document.querySelector("#checks").innerHTML=
      results.map(item=>`
        <div class="stack-row">
          <strong>${item.path}</strong>
          <span class="status-pill ${item.ok?"active":"expired"}">
            ${item.ok?"CORRECTO":"FALTA"}
          </span>
        </div>
      `).join("");
  </script>
</body>
</html>
