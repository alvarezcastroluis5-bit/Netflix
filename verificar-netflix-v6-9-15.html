<!doctype html>
<html lang="es" translate="no" class="notranslate">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar Netflix V6.9.15</title>
  <link rel="stylesheet" href="./styles.css?v=6.9.16">
</head>
<body>
  <main style="max-width:900px;margin:30px auto;padding:14px">
    <article class="glass-panel">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Netflix directo V6.9.15</h1>
      <p>Verifica el acceso directo y los recortes visuales.</p>
      <div id="checks" class="stack-list">Verificando…</div>
    </article>
  </main>
  <script>
    Promise.all([
      fetch('./js/core-6.9.15.js?ts='+Date.now(),{cache:'no-store'}).then(r=>r.text()),
      fetch('./styles.css?ts='+Date.now(),{cache:'no-store'}).then(r=>r.text())
    ]).then(([js,css])=>{
      const checks=[
        ['Valida propiedad',js.includes('validate_netflix_access_v29')],
        ['Entra directo a la herramienta',js.includes('await enterTool(data)')],
        ['Sin selector local de operación',!js.includes('Selecciona la operación')],
        ['Sin pestañas nuevas',!js.includes('window.open(')],
        ['PIN 071726 visible',js.includes('071726')],
        ['URL no visible como texto',!js.includes('jp-streaming.pages.dev')],
        ['Máscara de encabezado y pie',css.includes('netflix-direct-mask-top')&&css.includes('netflix-direct-mask-bottom')],
        ['Correo externo cubierto',css.includes('netflix-direct-email-mask')&&js.includes('netflixDirectMaskedEmail')]
      ];
      document.getElementById('checks').innerHTML=checks.map(([n,ok])=>`<div class="stack-row"><strong>${n}</strong><span class="status-pill ${ok?'active':'expired'}">${ok?'CORRECTO':'FALTA'}</span></div>`).join('');
    }).catch(error=>{
      document.getElementById('checks').textContent=error.message;
    });
  </script>
</body>
</html>
