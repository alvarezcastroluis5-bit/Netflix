<!doctype html>
<html lang="es" translate="no" class="notranslate">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar V6.9.16</title>
  <link rel="stylesheet" href="./css/styles.css?v=6.9.20">
</head>
<body>
  <main style="max-width:920px;margin:30px auto;padding:14px">
    <article class="glass-panel">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Centro Premium V6.9.16</h1>
      <p>Comprueba Soporte y el nuevo flujo Netflix.</p>
      <div id="checks" class="stack-list">Verificando…</div>
    </article>
  </main>

  <script type="module">
    const files=[
      [
        "js/reseller-6.9.16.js",
        text=>
          text.includes("function distributorTicketStatusLabel")
          &&text.includes('open:"Pendiente de resolver"')
      ],
      [
        "js/core-6.9.16.js",
        text=>
          text.includes("validate_netflix_owner_access_v35")
          &&text.includes("Restablecer clave")
          &&text.includes("Código de acceso temporal")
          &&!text.includes("changeNetflixDirectEmail")
          &&!text.includes("Ya ingresé el PIN")
      ],
      [
        "css/styles.css",
        text=>
          text.includes("V6.9.16 · SOPORTE CORREGIDO")
          &&text.includes(".netflix-v16-mask-top")
          &&text.includes(".netflix-v16-email-cover")
      ],
      [
        "sql/bloque_35_validacion_netflix_propietario_exacto.sql",
        text=>
          text.includes("current_reseller_id=v_actor")
          &&text.includes("validate_netflix_owner_access_v35")
      ]
    ];

    const results=[];

    for(const [path,test] of files){
      try{
        const response=await fetch(
          `${path}?check=${Date.now()}`,
          {cache:"no-store"}
        );

        const text=await response.text();

        results.push({
          path,
          ok:response.ok&&test(text)
        });
      }catch{
        results.push({
          path,
          ok:false
        });
      }
    }

    document.querySelector("#checks").innerHTML=
      results.map(item=>`
        <div class="stack-row">
          <strong>${item.path}</strong>
          <span class="status-pill ${item.ok?"active":"expired"}">
            ${item.ok?"CORRECTO":"FALTA"}
          </span>
        </div>
      `).join("");
  </script>
</body>
</html>
