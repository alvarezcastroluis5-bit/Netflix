<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar Netflix V6.9.12</title>
  <link rel="stylesheet" href="./styles.css?v=6.9.12">
</head>
<body>
  <main style="max-width:920px;margin:28px auto;padding:16px">
    <article class="glass-panel">
      <span class="eyebrow">VERIFICACIÓN</span>
      <h1>Netflix embebido V6.9.12</h1>
      <div id="checks" class="stack-list">Verificando…</div>
    </article>
  </main>
  <script>
    fetch('./js/core-6.9.12.js?ts='+Date.now(),{cache:'no-store'})
      .then(r=>r.text())
      .then(text=>{
        const checks=[
          ['Valida propiedad',text.includes('validate_netflix_access_v29')],
          ['Operación y Continuar',text.includes('continueNetflixEmbed')],
          ['Iframe dentro del modal',text.includes('netflixRealFrame')],
          ['No abre otra pestaña',!text.includes('window.open(')],
          ['PIN 071726',text.includes('071726')],
          ['Sin enlace visible',!text.includes('<a href=')],
          ['URL solo como fuente interna',text.includes('NETFLIX_EMBED_URL')]
        ];
        document.getElementById('checks').innerHTML=checks.map(([name,ok])=>
          `<div class="stack-row"><strong>${name}</strong><span class="status-pill ${ok?'active':'expired'}">${ok?'CORRECTO':'FALTA'}</span></div>`
        ).join('');
      });
  </script>
</body>
</html>
