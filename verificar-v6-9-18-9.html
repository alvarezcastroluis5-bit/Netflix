<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar V6.9.18.9</title>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:Arial,sans-serif;background:#07101c;color:#fff;padding:28px}
    main{max-width:920px;margin:auto}
    .card{background:#0d1b2c;border:1px solid #23405e;border-radius:18px;padding:24px;box-shadow:0 18px 50px #0006}
    .eyebrow{color:#35d7ff;font-weight:700;letter-spacing:.12em;font-size:.78rem}
    h1{margin:.45rem 0 .4rem;font-size:2rem}
    p{color:#a9bdd3;line-height:1.55}
    .row{display:flex;justify-content:space-between;gap:18px;align-items:center;border-top:1px solid #20364e;padding:14px 0}
    .row:first-child{border-top:0}
    code{color:#8be8ff;overflow-wrap:anywhere}
    .status{font-weight:800;border-radius:999px;padding:7px 12px;white-space:nowrap}
    .ok{color:#2be59b;background:#0b3c31}
    .bad{color:#ff6b7a;background:#451d27}
    .summary{margin-top:18px;padding:14px 16px;border-radius:12px;font-weight:700}
    @media(max-width:620px){.row{align-items:flex-start;flex-direction:column}.status{align-self:flex-start}}
  </style>
</head>
<body>
<main>
  <section class="card">
    <span class="eyebrow">VERIFICACIÓN</span>
    <h1>Centro Premium V6.9.18.9</h1>
    <p>Comprueba la lectura persistente, los avisos de red directa, el reenvío por niveles y los archivos cargados en el hosting.</p>
    <div id="checks">Verificando…</div>
    <div id="summary"></div>
  </section>
</main>
<script type="module">
const checks=[
  ["admin.html",t=>t.includes("bootstrap-admin-6.9.18.9.js")],
  ["revendedores.html",t=>t.includes("bootstrap-reseller-6.9.18.9.js")],
  ["js/core-6.9.18.9.js",t=>t.includes('is("read_at",null)')&&t.includes("mark_notification_read_v21")&&t.includes("notification-alert.mp3")],
  ["js/reseller-6.9.18.9.js",t=>t.includes("forward_notification_to_my_network")&&t.includes("send_hierarchical_notification_v36")&&t.includes("No tienes notificaciones pendientes")],
  ["js/admin-6.9.18.9.js",t=>t.includes("send_hierarchical_notification_v36")],
  ["sql/bloque_41_notificaciones_pendientes_y_red_directa.sql",t=>t.includes("mark_notification_read_v21")&&t.includes("forward_notification_to_my_network")&&t.includes("send_hierarchical_notification_v36")&&t.includes("read_at")],
  ["assets/notification-alert.mp3",(_,r)=>r.ok]
];
const results=[];
for(const [path,test] of checks){
  try{
    const response=await fetch(`${path}?v=${Date.now()}`,{cache:"no-store"});
    const text=path.endsWith(".mp3")?"":await response.text();
    results.push({path,ok:response.ok&&test(text,response)});
  }catch(error){
    results.push({path,ok:false,error:error.message});
  }
}
const root=document.querySelector("#checks");
root.innerHTML=results.map(item=>`<div class="row"><code>${item.path}</code><span class="status ${item.ok?"ok":"bad"}">${item.ok?"CORRECTO":"FALTA"}</span></div>`).join("");
const allOk=results.every(item=>item.ok);
const summary=document.querySelector("#summary");
summary.className=`summary ${allOk?"ok":"bad"}`;
summary.textContent=allOk?"Todos los archivos de la versión V6.9.18.9 están cargados correctamente.":"Hay uno o más archivos ausentes o desactualizados. Vuelve a subir el paquete completo y actualiza con Ctrl + F5.";
</script>
</body>
</html>
