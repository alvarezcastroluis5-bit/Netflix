<!doctype html>
<html lang="es" translate="no" class="notranslate">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar Netflix V6.9.14</title>
  <link rel="stylesheet" href="./styles.css?v=6.9.17">
</head>
<body>
  <main style="max-width:900px;margin:30px auto;padding:14px">
    <article class="glass-panel">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Netflix local limpio V6.9.14</h1>
      <p>Comprueba que no existe iframe ni referencia externa.</p>
      <div id="checks" class="stack-list">Verificando…</div>
    </article>
  </main>
  <script type="module">
    const files=[
      [
        "js/core-6.9.14.js",
        text=>
          text.includes("process_netflix_local_v34")
          &&text.includes("CENTRO DE CÓDIGOS")
          &&text.includes("Buscar código")
          &&!text.includes("<iframe")
          &&!text.includes("jp"+"-streaming")
          &&!text.includes("Netflix@"+"jp")
      ],
      [
        "sql/bloque_34_netflix_local_limpio.sql",
        text=>
          text.includes("process_netflix_local_v34")
          &&text.includes("validate_netflix_access_v29")
          &&text.includes("create_netflix_action_request_v29")
      ],
      [
        "styles.css",
        text=>text.includes("V6.9.14 · NETFLIX LOCAL LIMPIO")
      ]
    ];

    const results=[];
    for(const [path,test] of files){
      try{
        const response=await fetch(`${path}?check=${Date.now()}`,{cache:"no-store"});
        const text=await response.text();
        results.push({path,ok:response.ok&&test(text)});
      }catch{
        results.push({path,ok:false});
      }
    }

    document.querySelector("#checks").innerHTML=results.map(item=>`
      <div class="stack-row">
        <strong>${item.path}</strong>
        <span class="status-pill ${item.ok?"active":"expired"}">
          ${item.ok?"CORRECTO":"FALTA"}
        </span>
      </div>
    `).join("");
  </script>
</body>
</html>
