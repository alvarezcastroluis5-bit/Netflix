<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verificar Netflix V6.9.11</title><link rel="stylesheet" href="./styles.css?v=6.9.11"></head><body><main style="max-width:960px;margin:28px auto;padding:16px"><article class="glass-panel"><span class="eyebrow">VERIFICACIÓN</span><h1>Netflix integrado V6.9.11</h1><div id="checks" class="stack-list">Verificando…</div></article></main><script>
const checks=[];fetch('./js/core-6.9.11.js?ts='+Date.now(),{cache:'no-store'}).then(r=>r.text()).then(text=>{checks.push(['Sin URL externa JP',!text.includes('jp-streaming.pages.dev/')]);checks.push(['Sin botón Abrir Netflix',!text.includes('Abrir Netflix')]);checks.push(['Herramienta integrada inline',text.includes('Herramienta integrada')&&text.includes('No se abre ninguna página externa')]);checks.push(['Botón Buscar código inline',text.includes('Buscar código')]);checks.push(['PIN general 071726',text.includes('071726')]);document.getElementById('checks').innerHTML=checks.map(([n,o])=>`<div class="stack-row"><strong>${n}</strong><span class="status-pill ${o?'active':'expired'}">${o?'CORRECTO':'FALTA'}</span></div>`).join('');}).catch(()=>{document.getElementById('checks').textContent='No se pudo verificar.';});
</script></body></html>
