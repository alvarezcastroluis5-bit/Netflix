<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verificar V6.9.18.4</title>
  <link rel="stylesheet" href="./css/styles.css?v=6.9.18.4">
</head>
<body>
  <main style="max-width:940px;margin:30px auto;padding:16px">
    <article class="glass-panel">
      <span class="eyebrow">VERIFICACIÓN</span>
      <h1>Centro Premium V6.9.18.4</h1>
      <p>El modal del tráiler debe mostrar la sinopsis completa.</p>
      <div id="checks">Verificando…</div>
    </article>
  </main>
  <script type="module">
    const checks=[
      ["js/admin-6.9.18.4.js",t=>
        t.includes("trailer-synopsis-panel")
        &&t.includes("data-admin-dashboard-synopsis")
      ],
      ["js/reseller-6.9.18.4.js",t=>
        t.includes("trailer-synopsis-panel")
        &&t.includes("button.dataset.synopsis")
      ],
      ["css/styles.css",t=>
        t.includes("V6.9.18.4 · TRÁILER CON SINOPSIS")
        &&t.includes(".trailer-detail-layout")
      ],
      ["admin.html",t=>t.includes("bootstrap-admin-6.9.18.4.js")],
      ["revendedores.html",t=>t.includes("bootstrap-reseller-6.9.18.4.js")]
    ];

    const results=[];
    for(const [path,test] of checks){
      try{
        const response=await fetch(`${path}?t=${Date.now()}`,{cache:"no-store"});
        const text=await response.text();
        results.push({path,ok:response.ok&&test(text)});
      }catch{
        results.push({path,ok:false});
      }
    }

    document.querySelector("#checks").innerHTML=
      results.map(item=>`
        <div class="stack-row">
          <strong>${item.path}</strong>
          <span class="status-pill ${item.ok?"active":"expired"}">
            ${item.ok?"CORRECTO":"FALTA"}
          </span>
        </div>
      `).join("");
  </script>
</body>
</html>
