<!doctype html>
<html lang="es" class="notranslate" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="google" content="notranslate">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  >
  <title>Verificar V6.9.4</title>
  <link
    rel="stylesheet"
    href="./css/styles.css?v=6.9.7"
  >
</head>
<body>
  <main style="max-width:900px;margin:40px auto;padding:20px">
    <article class="glass-panel">
      <span class="eyebrow">DIAGNÓSTICO</span>
      <h1>Centro Premium V6.9.4</h1>
      <p>
        Esta página comprueba si GitHub publicó los archivos nuevos.
      </p>

      <div id="checks" class="stack-list">
        Verificando…
      </div>
    </article>
  </main>

  <script>
    async function checkFile(path,tests){
      try{
        const response=await fetch(
          `${path}?diagnostic=${Date.now()}`,
          {cache:"no-store"}
        );

        if(!response.ok){
          return {
            path,
            ok:false,
            detail:`HTTP ${response.status}`
          };
        }

        const text=await response.text();
        const missing=tests.filter(
          test=>!text.includes(test)
        );

        return {
          path,
          ok:missing.length===0,
          detail:missing.length
            ?`Falta: ${missing.join(" | ")}`
            :"Archivo correcto"
        };
      }catch(error){
        return {
          path,
          ok:false,
          detail:error.message
        };
      }
    }

    Promise.all([
      checkFile(
        "js/reseller-6.9.4.js",
        [
          'placeholder="5917000000"',
          'const contentGrid=$("#contentGrid")',
          'Centro Premium reseller V6.9.4 cargado'
        ]
      ),
      checkFile(
        "js/core-6.9.4.js",
        ["export function setupLogin"]
      ),
      checkFile(
        "js/bootstrap-reseller-6.9.4.js",
        ['./reseller-6.9.4.js']
      )
    ]).then(results=>{
      document.querySelector("#checks").innerHTML=
        results.map(result=>`
          <div class="stack-row">
            <div>
              <strong>${result.path}</strong>
              <small>${result.detail}</small>
            </div>
            <span class="status-pill ${
              result.ok?"active":"expired"
            }">
              ${result.ok?"CORRECTO":"FALTA"}
            </span>
          </div>
        `).join("");
    });
  </script>
</body>
</html>
